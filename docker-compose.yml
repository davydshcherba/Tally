services:
  postgres:
    image: postgres:16-alpine
    container_name: postgres_db
    restart: always
    # values come from .env (see .env.example); defaults keep local dev working
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # One-shot deploy step: applies pending Alembic migrations, then exits.
  # Runs once per `docker compose up`, so API replicas never race to migrate.
  migrate:
    build: ./backend
    container_name: tally_migrate
    command: ["uv", "run", "--no-dev", "alembic", "upgrade", "head"]
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-postgres}
    depends_on:
      postgres:
        condition: service_healthy

  api:
    build: ./backend
    container_name: tally_api
    restart: always
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-postgres}
      # no default on purpose: admin endpoints stay disabled (503) until a key is set
      API_KEY: ${API_KEY:-}
    ports:
      - "8000:8000"
    depends_on:
      migrate:
        condition: service_completed_successfully

volumes:
  postgres_data:
